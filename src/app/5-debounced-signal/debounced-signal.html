<h2>Raw vs. debounced value</h2>

<div>
  <label for="search">Search</label>
  <input
    id="search"
    type="text"
    class="mb-3"
    placeholder="Try typing 'berry'…"
    [(ngModel)]="search"
  />
</div>

<div>Search value : {{ search() }}</div>
<div>Debounced Search value : {{ debouncedSearch.value() }}</div>
